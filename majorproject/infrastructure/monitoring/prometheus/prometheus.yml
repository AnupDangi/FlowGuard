global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: kafka_exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres_catalog
    static_configs:
      - targets: ["postgres-exporter-catalog:9187"]

  - job_name: postgres_analytics
    static_configs:
      - targets: ["postgres-exporter-analytics:9187"]

  - job_name: flowguard_gateway
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics/prometheus

  - job_name: flowguard_pipeline_exporter
    static_configs:
      - targets: ["flowguard-exporter:9115"]

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8000/health
          - http://host.docker.internal:8001/health
          - http://host.docker.internal:8080/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
