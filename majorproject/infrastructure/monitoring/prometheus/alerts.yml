groups:
  - name: flowguard-core-alerts
    rules:
      - alert: GatewayDown
        expr: probe_success{job="blackbox_http", instance="http://host.docker.internal:8000/health"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Events Gateway is down"
          description: "HTTP health probe to Events Gateway is failing for >1m."

      - alert: AirflowHealthDown
        expr: probe_success{job="blackbox_http", instance="http://host.docker.internal:8080/health"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Airflow health endpoint failing"
          description: "Airflow /health endpoint probe has failed for >2m."

      - alert: KafkaExporterDown
        expr: up{job="kafka_exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka exporter is down"
          description: "Prometheus cannot scrape kafka-exporter for >2m."

      - alert: PostgresExporterDown
        expr: up{job=~"postgres_catalog|postgres_analytics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter down"
          description: "Prometheus cannot scrape one of the Postgres exporters for >2m."

      - alert: EtlPipelineStale
        expr: flowguard_exporter_up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ETL/batch exporter stale"
          description: "Custom FlowGuard ETL exporter loop is failing."

      - alert: FraudAlertSpike
        expr: increase(flowguard_fraud_alerts_total[10m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Fraud alerts spike"
          description: "Fraud alert count increased by >20 in the last 10 minutes."
