version: "3.8"

# Airflow standalone setup for FlowGuard
# Uses LocalExecutor (no Celery/Redis needed for local dev)
# Shares the flowguard-network so DAGs can reach Kafka/Postgres

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "FlowGuardFernetKey1234567890abcdefghijklmnop="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "flowguard-secret-key"
    # Pass FlowGuard env vars into DAGs
    SNOWFLAKE_ACCOUNT: "${SNOWFLAKE_ACCOUNT}"
    SNOWFLAKE_USER: "${SNOWFLAKE_USER}"
    SNOWFLAKE_PASSWORD: "${SNOWFLAKE_PASSWORD}"
    SNOWFLAKE_DATABASE: "${SNOWFLAKE_DATABASE:-FLOWGUARD_DB}"
    SNOWFLAKE_WAREHOUSE: "${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}"
    PYTHONPATH: "/opt/airflow/project"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Mount project so DAGs can import scripts/
    - .:/opt/airflow/project
    # Mount venv so DAGs can use installed packages
    - ../venv:/opt/airflow/venv
  networks:
    - flowguard-network
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  # ── Airflow metadata DB (separate from FlowGuard postgres) ──────────────────
  airflow-postgres:
    image: postgres:15-alpine
    container_name: flowguard-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - flowguard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow DB init (runs once) ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: flowguard-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install snowflake-connector-python python-dotenv --quiet
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname FlowGuard \
          --lastname Admin \
          --role Admin \
          --email admin@flowguard.local \
          --password admin
        echo "Airflow initialized ✅"
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: flowguard-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: flowguard-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  flowguard-network:
    external: true
    name: flowguard-network

volumes:
  airflow-postgres-data:
    driver: local
